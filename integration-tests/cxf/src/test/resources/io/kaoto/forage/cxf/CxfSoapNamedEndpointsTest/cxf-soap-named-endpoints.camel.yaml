- route:
    id: cxf-named-server
    streamCache: false
    from:
      uri: cxf:bean:helloServer
      steps:
        - log:
            message: "Server received SOAP request"
        - setBody:
            constant:
              expression: >
                <sayHelloResponse xmlns="http://example.com/hello"><greeting>Hello from named CXF server</greeting></sayHelloResponse>
        - log:
            message: "Server sending SOAP response"
- route:
    id: cxf-named-caller
    from:
      uri: timer
      parameters:
        timerName: soap-caller
        repeatCount: 1
        delay: 5000
      steps:
        - setBody:
            constant:
              expression: >
                <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
                  <soap:Body>
                    <sayHello xmlns="http://example.com/hello"><name>Forage</name></sayHello>
                  </soap:Body>
                </soap:Envelope>
        - setHeader:
            name: CamelHttpMethod
            constant:
              expression: POST
        - setHeader:
            name: Content-Type
            constant:
              expression: text/xml
        - to:
            uri: "cxf://http://localhost:8080/services/hello?dataFormat=RAW"
        - log:
            message: "Client received response: ${body}"

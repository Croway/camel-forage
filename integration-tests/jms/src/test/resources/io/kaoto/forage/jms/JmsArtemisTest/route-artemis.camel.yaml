# Consumer application (the system under test): XA transactions enabled. The
# messages on input.queue are produced by a plain JMS client in the test JVM
# (TestJmsProducer), proving producer and consumer are fully decoupled. Only the
# rollback-producer below sends from this XA app, and it must run inside a JTA
# transaction (see #427): the XA pool always hands out XA sessions and
# unenlisted sends are silently discarded by brokers like IBM MQ.
- route:
    id: transactional-consumer-route
    from:
      id: jms-consumer
      uri: jms
      parameters:
        destinationName: input.queue
        destinationType: queue
        # transacted must stay false with XA: the JTA transaction manager wired into the
        # JMS component drives the transaction; a local JMS transaction on an XA
        # connection is rejected by brokers such as IBM MQ (MQRC 2072). See #427.
        cacheLevelName: CACHE_NONE
      steps:
        - transacted:
            id: xa-transaction
            ref: PROPAGATION_REQUIRED
        - log:
            id: log-processing
            message: "Processing message: ${body}"
        - choice:
            id: error-simulation
            otherwise:
              id: success-path
              steps:
                - log:
                    id: log-success
                    message: Processing successful - committing transaction
                - to:
                    id: send-to-output
                    uri: jms
                    parameters:
                      destinationName: output.queue
                      destinationType: queue
                - log:
                    id: log-forwarded
                    message: Message forwarded to output queue
            when:
              - steps:
                  - log:
                      id: log-error
                      message: "Simulating error - message will be rolled back "
                  - throwException:
                      id: throw-error
                      exceptionType: java.lang.RuntimeException
                      message: Simulated processing error
                simple:
                  expression: ${header.counter} < 3
- route:
    id: output-consumer-route
    from:
      id: output-consumer
      uri: jms
      parameters:
        destinationName: output.queue
        destinationType: queue
      steps:
        - log:
            id: log-processed
            message: "Successfully processed message: ${body}"
- route:
    id: dlq-consumer-route
    from:
      id: dlq-consumer
      uri: jms
      parameters:
        destinationName: DLQ
        destinationType: queue
      steps:
        - log:
            id: log-dlq
            message: "Message sent to DLQ after max redeliveries: ${body}"
# Rollback assertion (#427): the first delivery throws so the JTA transaction rolls
# back; only a real XA rollback returns the message to the broker, which redelivers it
# with JMSRedelivered=true. With broken XA enlistment the message would be lost
# (auto-acked) and the redelivered log line would never appear.
- route:
    id: rollback-producer-route
    from:
      id: timer-rollback-producer
      uri: timer
      parameters:
        period: "5000"
        repeatCount: 1
        timerName: rollbackProducer
      steps:
        - transacted:
            id: rollback-producer-xa-transaction
            ref: PROPAGATION_REQUIRED
        - setBody:
            id: set-rollback-message
            simple:
              expression: Rollback test message
        - to:
            id: send-to-rollback
            uri: jms
            parameters:
              destinationName: rollback.queue
              destinationType: queue
- route:
    id: rollback-consumer-route
    errorHandler:
      noErrorHandler: {}
    from:
      id: rollback-consumer
      uri: jms
      parameters:
        destinationName: rollback.queue
        destinationType: queue
        cacheLevelName: CACHE_NONE
      steps:
        - choice:
            id: rollback-check
            otherwise:
              id: redelivered-path
              steps:
                - log:
                    id: log-redelivered
                    message: "Message redelivered after XA rollback: ${body}"
            when:
              - steps:
                  - log:
                      id: log-first-delivery
                      message: "First delivery - forcing XA rollback: ${body}"
                  - throwException:
                      id: throw-rollback
                      exceptionType: java.lang.RuntimeException
                      message: Forcing XA rollback
                simple:
                  expression: ${header.JMSRedelivered} == false
- errorHandler:
    deadLetterChannel:
      deadLetterUri: jms:DLQ
      redeliveryPolicy:
        maximumRedeliveries: 2
      useOriginalBody: true

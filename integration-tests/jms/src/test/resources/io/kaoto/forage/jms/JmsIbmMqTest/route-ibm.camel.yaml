# Consumer application (the system under test): XA transactions enabled. The
# messages on input.queue are produced by a SEPARATE producer application with a
# plain connection factory (see producer/), proving producer and consumer are
# fully decoupled. Sends from this XA application happen only inside the JTA
# transaction (forward to output.queue, dead-letter to DLQ), where the XA
# session is enlisted automatically. See #427.
- route:
    id: transactional-consumer-route
    from:
      id: jms-consumer
      uri: jms
      parameters:
        destinationName: input.queue
        destinationType: queue
        # transacted must stay false with XA: the JTA transaction manager wired into the
        # JMS component drives the transaction; a local JMS transaction on an XA
        # connection is rejected by IBM MQ (MQRC_SYNCPOINT_NOT_AVAILABLE, 2072). See #427.
        cacheLevelName: CACHE_NONE
      steps:
        - transacted:
            id: xa-transaction
            ref: PROPAGATION_REQUIRED
        - log:
            id: log-processing
            message: "Processing message: ${body}"
        - choice:
            id: error-simulation
            otherwise:
              id: success-path
              steps:
                - log:
                    id: log-success
                    message: Processing successful - committing transaction
                - to:
                    id: send-to-output
                    uri: jms
                    parameters:
                      destinationName: output.queue
                      destinationType: queue
                - log:
                    id: log-forwarded
                    message: Message forwarded to output queue
            when:
              - steps:
                  - log:
                      id: log-error
                      message: "Simulating error - message will be rolled back "
                  - throwException:
                      id: throw-error
                      exceptionType: java.lang.RuntimeException
                      message: Simulated processing error
                simple:
                  expression: ${header.counter} < 3
- route:
    id: output-consumer-route
    from:
      id: output-consumer
      uri: jms
      parameters:
        destinationName: output.queue
        destinationType: queue
      steps:
        - log:
            id: log-processed
            message: "Successfully processed message: ${body}"
- route:
    id: dlq-consumer-route
    from:
      id: dlq-consumer
      uri: jms
      parameters:
        destinationName: DLQ
        destinationType: queue
      steps:
        - log:
            id: log-dlq
            message: "Message sent to DLQ after max redeliveries: ${body}"
- errorHandler:
    deadLetterChannel:
      deadLetterUri: jms:DLQ
      redeliveryPolicy:
        maximumRedeliveries: 2
      useOriginalBody: true
